<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title id="ui-doc-title">Skill Icons Generator</title>

    <link rel="stylesheet" href="/src/style.css">
    <script src="/Sortable.min.js"></script>
    <script type="module" src="/src/script.js"></script>
</head>

<body>
    <div class="top-actions">
        <nav class="quick-links" aria-label="Project links">
            <a class="quick-link" href="https://evgo2017.com/project/skill-icons-picker" target="_blank" rel="noopener noreferrer">
                <svg class="quick-link-icon" viewBox="0 0 24 24" aria-hidden="true">

                </svg>
                <span id="ui-link-online">在线</span>
            </a>
            <a class="quick-link" href="https://github.com/evgo2017/skill-icons-picker" target="_blank" rel="noopener noreferrer">
                <svg class="quick-link-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 2C6.48 2 2 6.58 2 12.23c0 4.52 2.87 8.35 6.84 9.71c.5.1.68-.22.68-.49v-1.72c-2.78.62-3.37-1.37-3.37-1.37c-.45-1.18-1.11-1.49-1.11-1.49c-.91-.64.07-.62.07-.62c1 .08 1.53 1.06 1.53 1.06c.9 1.58 2.36 1.12 2.94.86c.09-.67.35-1.12.64-1.38c-2.22-.26-4.56-1.14-4.56-5.07c0-1.12.39-2.04 1.03-2.76c-.1-.26-.45-1.31.1-2.72c0 0 .84-.28 2.75 1.05a9.33 9.33 0 0 1 5 0c1.9-1.33 2.74-1.05 2.74-1.05c.55 1.41.2 2.46.1 2.72c.64.72 1.03 1.64 1.03 2.76c0 3.94-2.34 4.8-4.57 5.06c.36.32.68.94.68 1.9v2.82c0 .27.18.6.69.49A10.27 10.27 0 0 0 22 12.23C22 6.58 17.52 2 12 2" />
                </svg>
                <span id="ui-link-github">GitHub</span>
            </a>
            <a class="quick-link" href="https://github.com/LelouchFR/skill-icons" target="_blank" rel="noopener noreferrer">
                <svg class="quick-link-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 19h16v-7h2v8a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1v-8h2v7zm14-9V6a1 1 0 0 0-1-1H7a1 1 0 0 0-1 1v4H4V6a3 3 0 0 1 3-3h10a3 3 0 0 1 3 3v4h-2zm-6 5.414l-5.707-5.707l1.414-1.414L11 11.586V4h2v7.586l3.293-3.293l1.414 1.414L12 15.414z" fill="currentColor"/>
                </svg>
                <span id="ui-link-icon-library">Icons - LelouchFR/skill-icons</span>
            </a>
        </nav>
        <div class="lang-switcher">
            <select id="lang-select">
                <option value="en-US">English</option>
                <option value="zh-CN">简体中文</option>
            </select>
        </div>
    </div>

    <div class="container">
        <h1 id="ui-title">Skill Icons Generator</h1>

        <section id="step-1">
            <h2 id="ui-step1"><span class="step-number">1</span> Select Icons</h2>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search icons...">
            </div>

            <div id="category-filters">
                <!-- Buttons injected by JS -->
            </div>

            <div id="icons-container">
                <!-- Sections injected by JS -->
            </div>
        </section>

        <section id="step-2">
            <h2 id="ui-step2"><span class="step-number">2</span> Sort Icons</h2>
            <div id="sort-container">
                <div class="sort-placeholder">Drag icons here to sort</div>
            </div>
        </section>

        <section id="step-3">
            <h2 id="ui-step3"><span class="step-number">3</span> Generate Code</h2>
            <div class="options-row">
                <div class="option-group">
                    <label for="theme-select" id="ui-themeLabel">Theme:</label>
                    <select id="theme-select">
                        <option value="dark">Dark</option>
                        <option value="light">Light</option>
                    </select>
                </div>
                <div class="option-group">
                    <label for="perline-select" id="ui-perlineLabel">Icons per line:</label>
                    <select id="perline-select">
                        <option value="0">Auto</option>
                        <option value="5">5</option>
                        <option value="10">10</option>
                        <option value="15">15</option>
                        <option value="20">20</option>
                    </select>
                </div>
            </div>

            <div id="preview-container" class="preview-container">
                <img id="preview-img" src="" alt="Preview" style="display: none;">
            </div>

            <div class="code-container">
                <textarea id="markdown-output" readonly placeholder="Markdown code will appear here..."></textarea>
                <button id="copy-btn" class="copy-btn">Copy</button>
            </div>
        </section>
    </div>
</body>

</html>
