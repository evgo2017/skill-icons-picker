<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title id="ui-doc-title">Skill Icons Generator</title>

    <link rel="stylesheet" href="/src/style.css">
    <script src="/Sortable.min.js"></script>
    <script type="module" src="/src/script.js"></script>
</head>

<body>
    <div class="lang-switcher">
        <select id="lang-select">
            <option value="en-US">English</option>
            <option value="zh-CN">简体中文</option>
        </select>
    </div>
    <div class="container">
        <h1 id="ui-title">Skill Icons Generator</h1>

        <section id="step-1">
            <h2 id="ui-step1"><span class="step-number">1</span> Select Icons</h2>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search icons...">
            </div>

            <div id="category-filters">
                <!-- Buttons injected by JS -->
            </div>

            <div id="icons-container">
                <!-- Sections injected by JS -->
            </div>
        </section>

        <section id="step-2">
            <h2 id="ui-step2"><span class="step-number">2</span> Sort Icons</h2>
            <div id="sort-container">
                <div class="sort-placeholder">Drag icons here to sort</div>
            </div>
        </section>

        <section id="step-3">
            <h2 id="ui-step3"><span class="step-number">3</span> Generate Code</h2>
            <div class="options-row">
                <div class="option-group">
                    <label for="theme-select" id="ui-themeLabel">Theme:</label>
                    <select id="theme-select">
                        <option value="dark">Dark</option>
                        <option value="light">Light</option>
                    </select>
                </div>
                <div class="option-group">
                    <label for="perline-select" id="ui-perlineLabel">Icons per line:</label>
                    <select id="perline-select">
                        <option value="0">Auto</option>
                        <option value="5">5</option>
                        <option value="10">10</option>
                        <option value="15">15</option>
                        <option value="20">20</option>
                    </select>
                </div>
            </div>

            <div id="preview-container" class="preview-container">
                <img id="preview-img" src="" alt="Preview" style="display: none;">
            </div>

            <div class="code-container">
                <textarea id="markdown-output" readonly placeholder="Markdown code will appear here..."></textarea>
                <button id="copy-btn" class="copy-btn">Copy</button>
            </div>
        </section>
    </div>
</body>

</html>
